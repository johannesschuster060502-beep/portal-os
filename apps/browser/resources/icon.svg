<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d0d"/>
      <stop offset="100%" style="stop-color:#050505"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9585f9"/>
      <stop offset="100%" style="stop-color:#7c6af7"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bg)"/>
  <!-- Outer border -->
  <rect x="2" y="2" width="508" height="508" rx="106" ry="106" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>
  <!-- Hexagon glyph -->
  <polygon
    points="256,100 358,158 358,274 256,332 154,274 154,158"
    fill="none"
    stroke="url(#accent)"
    stroke-width="6"
    stroke-linejoin="round"
  />
  <!-- Inner dot -->
  <circle cx="256" cy="216" r="18" fill="url(#accent)" opacity="0.6"/>
  <!-- Portal OS text -->
  <text x="256" y="420" text-anchor="middle" font-family="SF Mono, Fira Code, monospace" font-size="42" font-weight="300" letter-spacing="8" fill="rgba(255,255,255,0.5)">PORTAL</text>
</svg>
